<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Impostor de las Tildes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            touch-action: manipulation;
        }

        .card-pulse:active {
            transform: scale(0.95);
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .correct-glow {
            box-shadow: 0 0 20px #22c55e;
            border-color: #22c55e;
        }

        .wrong-glow {
            box-shadow: 0 0 20px #ef4444;
            border-color: #ef4444;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="text-center space-y-6 max-w-md w-full">
        <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 floating">
            ¿Quién es el Impostor?
        </h1>
        <p class="text-slate-400 text-lg">
            Encuentra la palabra que tiene una acentuación diferente al resto. ¡No dejes que las tildes te engañen!
        </p>
        <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition-all transform hover:scale-105 active:scale-95 text-xl">
            ¡Comenzar Misión!
        </button>
    </div>

    <!-- Pantalla de Juego -->
    <div id="game-screen" class="hidden w-full max-w-2xl space-y-6">
        <div class="flex justify-between items-center mb-4">
            <div class="space-y-1">
                <span class="text-slate-400 text-sm uppercase tracking-widest">Nivel</span>
                <div id="level-display" class="text-2xl font-bold">1</div>
            </div>
            <div class="text-right space-y-1">
                <span class="text-slate-400 text-sm uppercase tracking-widest">Vidas</span>
                <div id="hearts-display" class="text-2xl flex gap-1 justify-end">❤️❤️❤️</div>
            </div>
        </div>

        <div class="w-full bg-slate-800 rounded-full h-3 mb-8">
            <div id="progress-bar" class="progress-bar bg-cyan-500 h-3 rounded-full" style="width: 0%"></div>
        </div>

        <div class="text-center mb-8">
            <h2 id="instruction-text" class="text-xl text-slate-300 font-medium italic">
                Cargando misión...
            </h2>
        </div>

        <div id="cards-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Las cartas se generan dinámicamente aquí -->
        </div>

        <div id="feedback-msg" class="text-center h-8 font-bold text-lg transition-opacity duration-300 opacity-0">
            Respuesta correcta
        </div>
    </div>

    <!-- Pantalla de Game Over -->
    <div id="end-screen" class="hidden text-center space-y-6 max-w-md w-full">
        <h2 id="end-title" class="text-5xl font-bold text-red-500">Misión Fallida</h2>
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
            <p class="text-slate-400 mb-2">Nivel Alcanzado</p>
            <p id="final-level" class="text-6xl font-black text-white">0</p>
        </div>
        <button id="btn-restart" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-4 px-8 rounded-2xl shadow-lg transition-all transform hover:scale-105 active:scale-95 text-xl">
            Reintentar
        </button>
    </div>

    <script>
        const wordsDB = {
            agudas: [
                "Café", "Camión", "Sofá", "Reloj", "Pared", "Acción", "Papel", "Perú", "Bailar", "Compás", 
                "Rubí", "Avión", "Capitán", "Salón", "Jamás", "Menú", "Raíz", "Cantó", "Azul", "Bondad"
            ],
            graves: [
                "Árbol", "Lápiz", "Mesa", "Silla", "Cárcel", "Fútbol", "Libro", "Cielo", "Azúcar", "Casa",
                "Perro", "Joven", "Examen", "Difícil", "Fácil", "Gato", "Piso", "Agua", "Viento", "Radio"
            ],
            esdrujulas: [
                "Médico", "Sábado", "Pájaro", "Música", "Lógica", "Cámara", "Página", "Árbitro", "Célula", "Túnel",
                "Océano", "Gráfico", "Rápido", "Tímido", "Plátano", "Brújula", "Esdrújula", "Víctor", "África", "Pánico"
            ]
        };

        let state = {
            level: 1,
            lives: 3,
            correctAnswer: null,
            isProcessing: false,
            score: 0
        };

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            end: document.getElementById('end-screen')
        };

        const elements = {
            level: document.getElementById('level-display'),
            hearts: document.getElementById('hearts-display'),
            cards: document.getElementById('cards-container'),
            progress: document.getElementById('progress-bar'),
            instruction: document.getElementById('instruction-text'),
            feedback: document.getElementById('feedback-msg'),
            finalLevel: document.getElementById('final-level'),
            endTitle: document.getElementById('end-title')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        function initGame() {
            state.level = 1;
            state.lives = 3;
            state.score = 0;
            updateHearts();
            showScreen('game');
            generateRound();
        }

        function updateHearts() {
            elements.hearts.textContent = "❤️".repeat(state.lives) + "🖤".repeat(3 - state.lives);
        }

        function getRandomFrom(array, count) {
            const shuffled = [...array].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function generateRound() {
            state.isProcessing = false;
            elements.feedback.classList.add('opacity-0');
            elements.level.textContent = state.level;
            elements.progress.style.width = `${Math.min(state.score * 10, 100)}%`;

            const categories = ['agudas', 'graves', 'esdrujulas'];
            const shuffledCats = [...categories].sort(() => 0.5 - Math.random());
            
            const mainCat = shuffledCats[0];
            const impoCat = shuffledCats[1];

            const mainWords = getRandomFrom(wordsDB[mainCat], 3);
            const impostorWord = getRandomFrom(wordsDB[impoCat], 1)[0];

            state.correctAnswer = impostorWord;

            const gameWords = [...mainWords, impostorWord].sort(() => 0.5 - Math.random());
            
            elements.instruction.textContent = `Tres de estas palabras son ${mainCat.toUpperCase()}, una es el IMPOSTOR.`;
            
            elements.cards.innerHTML = '';
            gameWords.forEach(word => {
                const btn = document.createElement('button');
                btn.className = "card-pulse bg-slate-800 border-2 border-slate-700 p-6 rounded-2xl text-2xl font-bold text-white hover:bg-slate-700 transition-all duration-200";
                btn.textContent = word;
                btn.onclick = () => handleChoice(word, btn);
                elements.cards.appendChild(btn);
            });
        }

        function handleChoice(word, btnElement) {
            if (state.isProcessing) return;
            state.isProcessing = true;

            if (word === state.correctAnswer) {
                btnElement.classList.add('correct-glow', 'bg-green-900');
                showFeedback("¡Objetivo Neutralizado!", "text-green-400");
                state.score++;
                if (state.score % 2 === 0) state.level++;
                
                setTimeout(() => {
                    generateRound();
                }, 1000);
            } else {
                btnElement.classList.add('wrong-glow', 'bg-red-900');
                showFeedback("¡Falsa alarma! Perdiste una vida.", "text-red-400");
                state.lives--;
                updateHearts();

                if (state.lives <= 0) {
                    setTimeout(() => endGame(), 1000);
                } else {
                    setTimeout(() => {
                        generateRound();
                    }, 1500);
                }
            }
        }

        function showFeedback(text, colorClass) {
            elements.feedback.textContent = text;
            elements.feedback.className = `text-center h-8 font-bold text-lg transition-opacity duration-300 opacity-100 ${colorClass}`;
        }

        function endGame() {
            elements.finalLevel.textContent = state.level;
            elements.endTitle.textContent = state.level > 5 ? "¡Buen Trabajo!" : "Misión Fallida";
            showScreen('end');
        }

        document.getElementById('btn-start').onclick = initGame;
        document.getElementById('btn-restart').onclick = initGame;

    </script>
</body>
</html>
